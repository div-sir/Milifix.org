name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Audit production dependencies
        run: npm audit --omit=dev --audit-level=moderate

      - name: Type check
        run: npm run check

      - name: Lint
        run: npm run lint

      - name: Run tests
        run: npm test

      - name: Verify Meridiel compiled output matches source
        run: |
          npm run build:meridiel
          git diff --exit-code -- public/meridiel/app/compiled || {
            echo '::error::public/meridiel/app/compiled/*.js is stale — run `npm run build:meridiel` and commit the result.'
            exit 1
          }

      - name: Build
        run: npm run build
        env:
          CMS_ALLOW_EMPTY: '1'

      - name: Check asset performance budget
        run: npm run test:budget

      - name: Install Chromium
        run: npx playwright install --with-deps chromium

      - name: Browser smoke and accessibility tests
        run: npm run test:e2e

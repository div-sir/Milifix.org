name: Scheduled rebuild

# 排程重建：定時打 Vercel Deploy Hook，把 CMS 上「已核准」的新投稿／內容
# 重新 build 上線。符合「不用即時更新」——投稿進 CMS 待審，核准後由這條
# 排程於下一輪重建時發佈。
#
# 前置設定（一次性）：
#   1. Vercel 專案 → Settings → Git → Deploy Hooks 建一個 hook（branch: main）
#   2. 複製 hook URL，存成 GitHub repo secret：VERCEL_DEPLOY_HOOK_URL
#
# 調整頻率：改下方 cron 即可。
#   每 2 小時： '0 */2 * * *'（預設）
#   每天一次： '0 16 * * *'（UTC 16:00 = 台灣 00:00）

on:
  schedule:
    - cron: '0 */2 * * *'
  workflow_dispatch: {} # 允許手動觸發

jobs:
  trigger-rebuild:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Vercel Deploy Hook
        env:
          HOOK_URL: ${{ secrets.VERCEL_DEPLOY_HOOK_URL }}
        run: |
          if [ -z "$HOOK_URL" ]; then
            echo "::error::VERCEL_DEPLOY_HOOK_URL secret 未設定，跳過。"
            exit 1
          fi
          echo "Triggering Vercel rebuild…"
          code=$(curl -s -o /dev/null -w '%{http_code}' -X POST "$HOOK_URL")
          echo "Deploy hook responded with HTTP $code"
          case "$code" in
            2*) echo "OK" ;;
            *) echo "::error::Deploy hook failed (HTTP $code)"; exit 1 ;;
          esac

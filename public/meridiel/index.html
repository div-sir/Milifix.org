<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Meridiel — Where I've Flown</title>
  <meta name="description" content="Build a living atlas of every flight you've taken with Meridiel." />
  <link rel="canonical" href="https://milifix.com/meridiel/" />
  <meta property="og:title" content="Meridiel — Where I've Flown" />
  <meta property="og:description" content="Build a living atlas of every flight you've taken." />
  <meta property="og:url" content="https://milifix.com/meridiel/" />
  <meta property="og:type" content="website" />
  <meta property="og:image" content="https://milifix.com/og-default.png" />
  <!-- ?v= busts browser/CDN caching of these same-origin files on every deploy
       that touches them — plain filenames with no content hash otherwise risk
       a returning visitor's browser serving a stale cached copy indefinitely.
       Bump this whenever app/*.css or app/*.js|jsx (or their compiled output)
       changes. -->
  <link rel="stylesheet" href="app/styles.css?v=20260710c" />
  <link rel="stylesheet" href="app/layout.css?v=20260715c" />

  <!-- Globe (open-source, no token) — globe.gl bundles its own Three.js.
       Vendored same-origin build (npm pack'd production dist, copied
       verbatim — see scripts/build-meridiel.mjs's header comment for the
       full vendoring story) instead of a public CDN: no outage / SRI-mismatch
       risk, and lets the CSP script-src list stay same-origin only. -->
  <script src="vendor/globe.gl.min.js?v=20260710c"></script>
  <!-- GSAP -->
  <script src="vendor/gsap.min.js?v=20260710c"></script>
  <!-- html2canvas for PNG export -->
  <script src="vendor/html2canvas.min.js?v=20260710c"></script>

  <!-- Google Identity Services (real sign-in; set a Client ID in app/login.jsx).
       Third-party origin by nature — this one stays remote. -->
  <script src="https://accounts.google.com/gsi/client" async></script>

  <!-- React — vendored production UMD build (no dev warnings/overhead in prod) -->
  <script src="vendor/react.production.min.js?v=20260710c"></script>
  <script src="vendor/react-dom.production.min.js?v=20260710c"></script>
</head>
<body>
  <div id="root"></div>

  <!-- data first (plain JS) -->
  <script src="app/data.js?v=20260710c"></script>
  <!-- shared persistence + merge helpers -->
  <script src="app/model.js?v=20260715a"></script>
  <!-- Google auth + Drive appData storage (plain JS, needs GIS loaded) -->
  <script src="app/store.js?v=20260715a"></script>
  <!-- React components — pre-compiled by scripts/build-meridiel.mjs from the
       app/*.jsx sources (JSX → React.createElement at build time instead of
       shipping @babel/standalone and compiling in every visitor's browser).
       Load order matters: later files use window.X globals set by earlier
       ones (see app/*.jsx headers). -->
  <script src="app/compiled/components.js?v=20260710c"></script>
  <script src="app/compiled/globe.js?v=20260710c"></script>
  <script src="app/compiled/panels.js?v=20260710c"></script>
  <script src="app/compiled/modals.js?v=20260710c"></script>
  <script src="app/compiled/login.js?v=20260715b"></script>
  <script src="app/compiled/app.js?v=20260715c"></script>
</body>
</html>
